<!DOCTYPE html>
<!--
  SHARE CARD TEMPLATE (1200 x 630)
  This is the source for a rich link-preview image (og:image / twitter:image).
  To turn it into an image:
    1. Open this file in a browser at exactly 1200 x 630 (the .card is that size).
    2. Screenshot just the card, or use a free HTML-to-image tool / htmlcsstoimage.com.
    3. Save it as images/og-card.jpg, then ping me and I'll point og:image at it.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d8d8d8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card {
      width: 1200px; height: 630px;
      background: linear-gradient(135deg, #fffaf0 0%, #f3ede0 55%, #eef4ec 100%);
      display: grid; grid-template-columns: 1.25fr 1fr;
      font-family: "Poppins", Arial, sans-serif; color: #262626;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; right: -120px; top: -120px;
      width: 420px; height: 420px; border-radius: 50%;
      background: radial-gradient(circle, rgba(127,156,120,0.20), transparent 70%);
    }
    .left { padding: 64px 56px; display: flex; flex-direction: column; justify-content: center; gap: 22px; z-index: 2; }
    .name { font-family: "Great Vibes", cursive; font-size: 44px; line-height: 1;
      background: linear-gradient(100deg, #7f9c78, #c15f3c 45%, #4a6fa5);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .headline { font-size: 52px; font-weight: 800; line-height: 1.08; letter-spacing: -0.01em; }
    .headline .g { background: linear-gradient(100deg, #7f9c78, #c15f3c 55%, #4a6fa5);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .role { font-size: 22px; font-weight: 600; color: #8b6f47; letter-spacing: 0.01em; }
    .facts { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
    .pill { font-size: 15px; font-weight: 600; padding: 8px 16px; border-radius: 999px;
      background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.08); }
    .right { position: relative; z-index: 2; display: flex; align-items: flex-end; justify-content: center; }
    .photo-frame {
      width: 360px; height: 470px; margin-bottom: 0; border-radius: 28px 28px 0 0;
      background: #ffffff; box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      overflow: hidden; display: flex; align-items: flex-end; justify-content: center;
    }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  </style>
</head>
<body>
  <div class="card">
    <div class="left">
      <div class="name">Eunice-Danielle Malingue</div>
      <div class="headline">I <span class="g">blend</span> design, technology &amp; business into human-centered products.</div>
      <div class="role">Product Manager · Product Designer</div>
      <div class="facts">
        <span class="pill">USC Iovine &amp; Young '26</span>
        <span class="pill">Los Angeles · open to relocation</span>
        <span class="pill">Seeking full-time</span>
      </div>
    </div>
    <div class="right">
      <div class="photo-frame">
        <img src="images/danielle-malingue.png" alt="Eunice-Danielle Malingue" />
      </div>
    </div>
  </div>
</body>
</html>
